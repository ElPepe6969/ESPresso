# ESP32 WoL Dashboard
# PlatformIO project for ESP32-S3 with MicroLink (Tailscale)
#
# Build: pio run
# Flash: pio run -t upload
# Monitor: pio run -t monitor
# Menuconfig: pio run -t menuconfig

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

# Use ESP-IDF v5.3+ (required by MicroLink)
platform_packages =
    framework-espidf @ https://github.com/espressif/esp-idf.git#v5.3.2

# Extra components directory
board_build.esp_idf.extra_components_dirs = ${PROJECT_DIR}/components

# Flash settings
board_build.flash_mode = dio
board_build.f_cpu = 240000000L
board_build.partitions = default_8MB.csv

# Heap size for main task (MicroLink needs ~8KB stack)
board_build.esp_idf.sdkconfig_append =
    CONFIG_ESP_MAIN_TASK_STACK_SIZE=8192
    CONFIG_SPIRAM=y
    CONFIG_SPIRAM_MODE_OCT=y
    CONFIG_SPIRAM_TYPE_AUTO=y
    CONFIG_SPIRAM_SPEED_80M=y
    CONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY=y
    CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=y
    CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768
    CONFIG_PARTITION_TABLE_SINGLE_APP_LARGE=y
    CONFIG_ML_MAX_PEERS=32
    CONFIG_ML_NVS_MAX_PEERS=64
    CONFIG_ML_H2_BUFFER_SIZE_KB=512
    CONFIG_ML_JSON_BUFFER_SIZE_KB=512

# Monitor filter: strip ANSI colors for clean logs
monitor_filters = colorize

# Alternative boards (uncomment your board):
# ESP32-C3 (RISC-V, no PSRAM — tight memory, ~30 peer limit)
[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = espidf
monitor_speed = 115200

platform_packages =
    framework-espidf @ https://github.com/espressif/esp-idf.git#v5.3.2

board_build.esp_idf.extra_components_dirs = ${PROJECT_DIR}/components
board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.partitions = default.csv

# C3: no PSRAM — keep buffers small
board_build.esp_idf.sdkconfig_append =
    CONFIG_ESP_MAIN_TASK_STACK_SIZE=6144
    CONFIG_ML_MAX_PEERS=8
    CONFIG_ML_H2_BUFFER_SIZE_KB=64
    CONFIG_ML_JSON_BUFFER_SIZE_KB=64
    CONFIG_ML_ENABLE_CONFIG_HTTPD=n

monitor_filters = colorize

# ESP32-S3 (default — PSRAM recommended)
